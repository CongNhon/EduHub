name: Frontend CI

on:
  pull_request:
    paths:
      - "FE/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches: [main]
    paths:
      - "FE/**"
      - ".github/workflows/frontend-ci.yml"

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: FE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: corepack prepare pnpm@11.13.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: docker build --build-arg APP=site --tag eduhub-site:ci .
      - run: docker build --build-arg APP=portal --build-arg EDUHUB_API_URL=http://eduhub-api:8080 --tag eduhub-portal:ci .
