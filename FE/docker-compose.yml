name: eduhub-frontend

x-frontend-security: &frontend-security
  init: true
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=64m,mode=1777
  restart: unless-stopped
  networks:
    - eduhub

services:
  site:
    <<: *frontend-security
    image: eduhub-site:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: site
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL:-http://localhost:3001}
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:${SITE_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(response=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

  portal:
    <<: *frontend-security
    image: eduhub-portal:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: portal
        EDUHUB_API_URL: http://eduhub-api:8080
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL:-http://localhost:3001}
        NEXT_PUBLIC_SIGNALR_URL: /hubs/notifications
      secrets:
        - devexpress_license
    environment:
      EDUHUB_API_URL: http://eduhub-api:8080
      PORT: 3000
    ports:
      - "127.0.0.1:${PORTAL_HOST_PORT:-3001}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/login').then(response=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

networks:
  eduhub:
    name: eduhub-dev
    external: true

secrets:
  devexpress_license:
    file: ${APPDATA:?APPDATA is required}/DevExpress/DevExpress_License.txt
