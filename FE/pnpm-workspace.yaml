packages:
  - "apps/*"
  - "packages/*"

allowBuilds:
  core-js: false
  inferno: false
  sharp: true
  unrs-resolver: true

overrides:
  js-yaml: 4.3.0
  postcss: 8.5.19
  sharp: 0.35.3

packageExtensions:
  "@hookform/resolvers@5.4.0":
    dependencies:
      zod: 4.4.3

minimumReleaseAgeExclude:
  - postcss@8.5.19
